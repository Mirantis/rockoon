{{- if and .Values.manifests.http_route_api }}
{{- $envAll := . -}}
{{- $port := tuple "sharev2" "internal" "api" . | include "helm-toolkit.endpoints.endpoint_port_lookup" }}
{{- $httpRouteOpts := dict "envAll" $envAll "backendServiceType" "sharev2" "backendService" "api" "backendPort" $port -}}
{{ $httpRouteOpts | include "helm-toolkit.manifests.http_route" }}
{{- end }}
